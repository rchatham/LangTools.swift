# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run tests
      # BenchmarkTests and PerformanceRatioGateTests are excluded from the merge-gating run:
      # BenchmarkTests is expensive (~20 methods x 2 suites x 10 measure iterations) with no
      # assertions to justify blocking merges, and PerformanceRatioGateTests asserts real
      # wall-clock ratios that can flake on a shared/noisy runner even with the ratio
      # normalization and headroom in ratios.json. Run them explicitly (locally or in a
      # separate non-blocking job) via:
      #   swift test --filter BenchmarkTests -v
      #   swift test --filter PerformanceRatioGateTests -v
      run: swift test -v --skip BenchmarkTests --skip PerformanceRatioGateTests
