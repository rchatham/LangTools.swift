# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run tests
      # Run merge-gating tests serially because the integration and agent suites use
      # process-global MockURLProtocol registration and shared handler state; parallel
      # XCTest execution can clobber handlers across tests and hang on shared runners.
      #
      # PerformanceTests, BenchmarkTests, and PerformanceRatioGateTests are excluded
      # from the merge-gating run: PerformanceTests and BenchmarkTests are XCTest
      # measure/reporting suites rather than functional correctness checks, and they
      # can be noisy/verbose on shared runners. PerformanceRatioGateTests asserts
      # real wall-clock ratios that can flake on a shared/noisy runner even with the
      # ratio normalization and headroom in ratios.json. Run them explicitly
      # (locally or in a separate non-blocking job) via:
      #   swift test --filter PerformanceTests -v
      #   swift test --filter BenchmarkTests -v
      #   swift test --filter PerformanceRatioGateTests -v
      run: swift test -v --no-parallel --skip BenchmarkTests --skip PerformanceRatioGateTests --skip PerformanceTests
